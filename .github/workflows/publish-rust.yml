name: publish-rust

# Triggered by pushing a tag of the form `rust/v*` (e.g. rust/v1.0.0)
# or via manual workflow_dispatch.
#
# Publishes the rust/ subdirectory crate `kxco-verify` to crates.io.
# All third-party actions pinned by 40-char commit SHA.

on:
  push:
    tags:
      - 'rust/v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Set to "true" to run cargo publish --dry-run instead of publishing'
        required: false
        default: 'false'
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tests pass before publish
        run: cargo test --all-features

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run
          else
            cargo publish
          fi
