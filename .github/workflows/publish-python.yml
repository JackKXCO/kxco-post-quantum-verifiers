name: publish-python

# Triggered by pushing a `python/v*` tag (e.g. python/v1.0.0) or via
# manual workflow_dispatch. Builds the kxco-verify package from the
# python/ subdirectory and uploads to PyPI via twine + PYPI_TOKEN.
#
# All third-party actions pinned by 40-char commit SHA.

on:
  push:
    tags:
      - 'python/v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: build + upload to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Verify tests pass before publish
        run: python test_kxco_verify.py

      - name: Install build + twine
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*
