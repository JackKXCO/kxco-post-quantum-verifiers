version: 2

updates:
  - package-ecosystem: gomod
    directory: "/go"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: [dependencies, go]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: pip
    directory: "/python"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: cargo
    directory: "/rust"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: [dependencies, rust]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    commit-message:
      prefix: ci
      include: scope
